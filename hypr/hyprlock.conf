source = ~/.config/Zenith/current/theme/hyprlock.conf



general {

    ignore_empty_input = true

    hide_cursor = true

}



background {

    monitor =

    path = ~/.config/Zenith/current/background.jpeg

    color = $color

    # The main background is sharp in the screenshot

    blur_passes = 0 

}



# --- THE LEFT PANEL ---

shape {

    monitor =

    size = 550, 100%

    color = $color # Dark tint

    rounding = 0

    

    # This creates the blurred effect seen in your image

    # Note: Requires hyprlock version with shape blur support

    # If your version doesn't support this, increase background blur instead

    # blur_passes = 4 

    

    position = 0, 0

    halign = left

    valign = center

}



# --- Welcome Text ---

label {

    monitor =

    text = Welcome!

    color = $font_color

    font_size = 45

    font_family = JetBrainsMonoNL Nerd Font Light



    position = 115, 260

    halign = left

    valign = center

    # This keeps it relative to the left panel's center

    target = shape 

}



# --- Time ---

label {

    monitor =

    text = $TIME

    color = $font_color

    font_size = 85

    font_family = JetBrainsMonoNL Nerd Font Bold



    position = 80, 170

    halign = left

    valign = center

    target = shape

}



# --- Date ---

label {

    monitor =

    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"

    color = $font_color

    font_size = 16

    font_family = JetBrainsMonoNL Nerd Font



    position = 100, 100

    halign = left

    valign = center

    target = shape

}



# --- Input Field (User/Password Box) ---

input-field {

    monitor =

    size = 350, 45

    outline_thickness = 1

    

    # Styling to match the screenshot's thin borders

    outer_color = $inner_color

    inner_color = $outer_color

    font_color = $font_color

    

    fade_on_empty = false # Keep it visible like the screenshot

    rounding = 8

    placeholder_text = <i>Password</i>



    position = 80, -70

    halign = left

    valign = center

    target = shape

}



# --- Unlock Button (Visual Label) ---

label {

    monitor =

    text = Unlock

    color = $font_color # Dark text on light button

    font_size = 14

    font_family = JetBrainsMonoNL Nerd Font Bold

    



    padding = 12, 100 # Makes it look like a wide button

    rounding = 8



    position = 225, -120

    halign = left

    valign = center

    target = shape

}
